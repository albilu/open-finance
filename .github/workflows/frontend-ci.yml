name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "openfinance-ui/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "openfinance-ui/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./openfinance-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: openfinance-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./openfinance-ui/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Build production bundle
        run: npm run build

      - name: Archive production build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: openfinance-ui/dist/

      - name: Analyze bundle size
        run: |
          ls -lh dist/assets/ || echo "Bundle analysis skipped"

  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: ./openfinance-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: openfinance-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting with Prettier
        run: npm run format:check || echo "Prettier check completed"
        continue-on-error: true

      - name: Run security audit
        run: npm audit || echo "Security audit completed"
        continue-on-error: true
